services:
  auto-manager-backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATA_DIR: /app/data
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:you@example.com}
    volumes:
      - wartung-data:/app/data
    # Kein "ports:" mehr -> nicht vom restlichen LAN erreichbar, nur intern über das
    # geteilte Docker-Netzwerk (z.B. für die Family-Dashboard-Einbettung auf demselben
    # Rechner). Siehe docs/SETUP.md, Abschnitt "Auf demselben Rechner wie
    # Family-Dashboard betreiben".
    expose:
      - "4000"
    networks:
      - default
      - familie-net

  auto-manager-frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - auto-manager-backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - default
      - familie-net

networks:
  # Geteiltes Netzwerk mit anderen Projekten auf demselben Rechner (z.B.
  # Family-Dashboard) -> muss einmalig existieren, siehe docs/SETUP.md.
  # Falls du Auto-Manager allein betreibst (kein Family-Dashboard auf demselben
  # Rechner), kannst du diesen Abschnitt sowie "familie-net" bei den Services oben
  # weglassen.
  familie-net:
    external: true

volumes:
  wartung-data:
